<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГДО "Королёв" - Локальная версия</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: #f0f4fa; padding: 2rem; }
        .app-container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 2rem; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #1a2a3f; text-align: center; margin-bottom: 1rem; }
        .players { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; margin-top: 2rem; }
        .player-card { background: #f8f9fa; border-radius: 1rem; padding: 1rem; border-left: 5px solid #ffb347; }
        .player-name { font-weight: bold; font-size: 1.1rem; margin-bottom: 0.5rem; }
        .stats { font-size: 0.9rem; color: #555; }
        button { background: #ffb347; border: none; padding: 5px 10px; border-radius: 20px; cursor: pointer; margin: 2px; }
        .login-area { text-align: right; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="login-area" id="loginArea"></div>
    <h1>🏐 ГДО "Королёв" — Состав команды</h1>
    <div id="playersList" class="players"></div>
</div>

<script>
    // Простейшая локальная версия
    const players = [
        "Рабатов Богдан Денисович", "Рабатов Глеб Денисович", "Икоркин Александр Владленович",
        "Кутузов Сергей Васильевич", "Ладина София Игоревна", "Молдованов Максим Александрович",
        "Лебедев Сергей Александрович", "Соколова Ольга Дмитриевна", "Ким Виталий Евгеньевич",
        "Захарова Алина Максимовна", "Новиков Роман Ильич", "Фёдорова Дарья Андреевна"
    ];

    // Загрузка статистики из localStorage
    let stats = JSON.parse(localStorage.getItem('volley_stats_local')) || {};
    players.forEach((name, i) => { if (!stats[`player_${i+1}`]) stats[`player_${i+1}`] = { serves:0, passes:0, receives:0, spikes:0 }; });

    function saveStats() { localStorage.setItem('volley_stats_local', JSON.stringify(stats)); }

    function render() {
        const container = document.getElementById('playersList');
        container.innerHTML = players.map((name, i) => {
            const id = `player_${i+1}`;
            const s = stats[id];
            return `
                <div class="player-card">
                    <div class="player-name">${name}</div>
                    <div class="stats">
                        🏐 Подачи: ${s.serves} 
                        <button onclick="changeStat('${id}', 'serves', 1)">+1</button>
                        <button onclick="changeStat('${id}', 'serves', -1)">-1</button><br>
                        🎯 Пасы: ${s.passes} 
                        <button onclick="changeStat('${id}', 'passes', 1)">+1</button>
                        <button onclick="changeStat('${id}', 'passes', -1)">-1</button><br>
                        🛡️ Приём: ${s.receives} 
                        <button onclick="changeStat('${id}', 'receives', 1)">+1</button>
                        <button onclick="changeStat('${id}', 'receives', -1)">-1</button><br>
                        ⚡ Нападение: ${s.spikes} 
                        <button onclick="changeStat('${id}', 'spikes', 1)">+1</button>
                        <button onclick="changeStat('${id}', 'spikes', -1)">-1</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    window.changeStat = (playerId, stat, delta) => {
        const newVal = Math.max(0, stats[playerId][stat] + delta);
        stats[playerId][stat] = newVal;
        saveStats();
        render();
    };

    function renderAuth() {
        document.getElementById('loginArea').innerHTML = `<span>🔐 Локальная версия (данные в браузере)</span>`;
    }

    renderAuth();
    render();
</script>
</body>
</html>
